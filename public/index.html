<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encrypted Comm Hub (Dark)</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #121214; 
            color: #e1e1e6;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            background: #202024; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.3); 
            width: 360px; 
            box-sizing: border-box; 
            border: 1px solid #29292e;
        }
        .hidden { display: none; }
        h2, h3 { margin-top: 0; color: #ffffff; }
        
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            box-sizing: border-box; 
            border: 1px solid #29292e; 
            border-radius: 6px; 
            font-size: 14px; 
            background: #121214;
            color: #e1e1e6;
            outline: none;
        }
        input:focus {
            border-color: #007bff;
        }
        
        button { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            box-sizing: border-box; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 6px;
            font-weight: bold; 
            cursor: pointer; 
            transition: background 0.2s; 
            font-size: 14px;
        }
        button:hover { background: #0056b3; }
        
        #chat-box { 
            height: 260px; 
            border: 1px solid #29292e; 
            overflow-y: auto; 
            padding: 12px; 
            margin-bottom: 10px; 
            background: #121214; 
            border-radius: 6px; 
        }
        #chat-box p { 
            margin: 8px 0; 
            line-height: 1.4; 
            color: #c4c4cc; 
        }
        #login-error { color: #f75a68; font-size: 14px; margin: 5px 0 0 0; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen">
        <h2>Secure Login</h2>
        <input type="text" id="username" placeholder="Username (user1 or user2)">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Connect Devices</button>
        <p id="login-error"></p>
    </div>

    <div id="chat-screen" class="hidden">
        <h3 id="welcome-text">Connected</h3>
        <div id="chat-box"></div>
        <input type="text" id="message-input" placeholder="Type an encrypted message...">
        <button onclick="sendMessage()">Send Encrypted</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
