<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Direct Chat</title>
    <style>
        body { 
            font-family: system-ui, sans-serif; 
            background: #121214; 
            color: #e1e1e6;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            background: #202024; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.5); 
            width: 600px; 
            box-sizing: border-box; 
            border: 1px solid #29292e;
        }
        .hidden { display: none !important; }
        .flex-layout { display: flex; gap: 20px; height: 340px; margin-top: 15px; }
        .sidebar { width: 40%; border-right: 1px solid #29292e; padding-right: 10px; overflow-y: auto; }
        .main-chat { width: 60%; display: flex; flex-direction: column; }
        
        input { 
            width: 100%; padding: 10px; margin: 8px 0; 
            box-sizing: border-box; border: 1px solid #29292e; 
            border-radius: 6px; background: #121214; color: #e1e1e6; outline: none;
        }
        button { 
            width: 100%; padding: 10px; margin: 5px 0; 
            background: #007bff; color: white; border: none; 
            border-radius: 6px; font-weight: bold; cursor: pointer; 
        }
        button:hover { background: #0056b3; }
        .alt-btn { background: #29292e; color: #a8a8b3; }
        .alt-btn:hover { background: #323238; }

        #chat-box { flex-grow: 1; border: 1px solid #29292e; overflow-y: auto; padding: 10px; background: #121214; border-radius: 6px; margin-bottom: 8px; }
        
        /* Clickable Directory Styles */
        .user-card { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 8px 10px; margin: 4px 0; border-radius: 6px; 
            cursor: pointer; background: #121214; border: 1px solid transparent; 
            transition: all 0.2s;
        }
        .user-card:hover { border-color: #007bff; }
        .user-card.active-target { background: #007bff; color: #ffffff; }
        .user-info { display: flex; align-items: center; gap: 8px; }
        
        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .dot-online { background: #04d361; }
        .dot-offline { background: #7c7c8a; }
        
        .status-label { font-size: 11px; opacity: 0.7; }
        #chat-header { margin: 0 0 10px 0; font-size: 16px; color: #a8a8b3; }
        #error-msg { color: #f75a68; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-screen">
        <h2 id="auth-title">Secure Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button id="primary-auth-btn" onclick="submitAuth()">Login</button>
        <button class="alt-btn" id="toggle-auth-btn" onclick="toggleAuthMode()">Create an Account</button>
        <p id="error-msg"></p>
    </div>

    <div id="app-screen" class="hidden">
        <h3 id="welcome-bar">Connected</h3>
        
        <div class="flex-layout">
            <div class="sidebar">
                <h4 style="margin-top:0;">Contacts</h4>
                <div id="users-list"></div>
            </div>
            
            <div class="main-chat">
                <div id="chat-header">Select a contact to chat</div>
                <div id="chat-box"></div>
                <input type="text" id="message-input" placeholder="Type private message..." disabled>
                <button id="send-btn" onclick="sendPrivateMsg()" disabled>Send Encrypted</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
