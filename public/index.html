<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Direct Chat & Voice</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: system-ui, sans-serif; 
            background: #121214; 
            color: #e1e1e6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* Fullscreen Layout for PC */
        .container { 
            background: #202024; 
            padding: 20px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.5); 
            width: 100vw;
            height: 100vh;
            border: none;
            display: flex;
            flex-direction: column;
        }

        .hidden { display: none !important; }

        /* Auth UI */
        #auth-screen { max-width: 380px; margin: auto; width: 100%; }

        input, textarea { 
            width: 100%; padding: 12px; margin: 8px 0; 
            border: 1px solid #29292e; border-radius: 6px; 
            background: #121214; color: #e1e1e6; outline: none;
            font-family: inherit;
        }

        /* Textarea customization for Shift+Enter support */
        textarea {
            resize: none;
            height: 60px;
        }

        button { 
            width: 100%; padding: 10px; margin: 5px 0; 
            background: #007bff; color: white; border: none; 
            border-radius: 6px; font-weight: bold; cursor: pointer; 
        }
        button:hover { background: #0056b3; }
        .alt-btn { background: #29292e; color: #a8a8b3; }
        .call-btn { background: #04d361; }
        .end-btn { background: #f75a68; }

        /* Flex Layout filling full screen */
        .flex-layout { display: flex; flex-grow: 1; gap: 20px; height: calc(100% - 60px); }
        
        .mobile-nav { display: none; margin-bottom: 10px; gap: 10px; }
        
        /* Desktop Split View */
        .sidebar { width: 280px; border-right: 1px solid #29292e; padding-right: 15px; overflow-y: auto; flex-shrink: 0; }
        .main-chat { flex-grow: 1; display: flex; flex-direction: column; }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .container { padding: 12px; }
            .mobile-nav { display: flex; }
            .flex-layout { flex-direction: column; }
            .sidebar, .main-chat { width: 100%; border-right: none; }
            .sidebar.mobile-hidden, .main-chat.mobile-hidden { display: none; }
        }

        #chat-box { flex-grow: 1; border: 1px solid #29292e; overflow-y: auto; padding: 12px; background: #121214; border-radius: 6px; margin-bottom: 10px; }
        
        .user-card { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 12px; margin: 4px 0; border-radius: 6px; 
            cursor: pointer; background: #121214; border: 1px solid transparent; 
        }
        .user-card.active-target { background: #007bff; color: #ffffff; }
        
        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .dot-online { background: #04d361; }
        .dot-offline { background: #7c7c8a; }
        
        .chat-header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        #error-msg { color: #f75a68; font-size: 13px; }
        
        #call-banner { 
            background: #29292e; padding: 10px; border-radius: 6px; 
            margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; 
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-row button {
            width: 120px;
            height: 60px;
            margin: 8px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-screen">
        <h2 id="auth-title">Secure Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button id="primary-auth-btn" onclick="submitAuth()">Login</button>
        <button class="alt-btn" id="toggle-auth-btn" onclick="toggleAuthMode()">Create an Account</button>
        <p id="error-msg"></p>
    </div>

    <div id="app-screen" class="hidden">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3 id="welcome-bar">Connected</h3>
            <button class="alt-btn" style="width: auto; padding: 6px 12px;" onclick="logout()">Logout</button>
        </div>

        <div class="mobile-nav">
            <button class="alt-btn" onclick="showMobileTab('contacts')">Contacts</button>
            <button class="alt-btn" onclick="showMobileTab('chat')">Chat Panel</button>
        </div>
        
        <div id="call-banner" class="hidden">
            <span id="call-status-text">Incoming Call...</span>
            <div style="display:flex; gap:5px;">
                <button id="accept-call-btn" class="call-btn" style="width:auto;" onclick="acceptCall()">Accept</button>
                <button id="end-call-btn" class="end-btn" style="width:auto;" onclick="endCall()">End</button>
            </div>
        </div>

        <div class="flex-layout">
            <div id="sidebar" class="sidebar">
                <h4 style="margin-top:0;">Contacts</h4>
                <div id="users-list"></div>
            </div>
            
            <div id="main-chat" class="main-chat">
                <div class="chat-header-bar">
                    <span id="chat-header">Select a contact</span>
                    <button id="start-call-btn" class="call-btn hidden" style="width:auto; padding: 6px 12px;" onclick="startCall()">📞 Call</button>
                </div>
                <div id="chat-box"></div>
                <div class="input-row">
                    <textarea id="message-input" placeholder="Type private message... (Press Enter to send, Shift+Enter for new line)" disabled></textarea>
                    <button id="send-btn" onclick="sendPrivateMsg()" disabled>Send</button>
                </div>
            </div>
        </div>
    </div>
</div>

<audio id="remote-audio" autoplay></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
